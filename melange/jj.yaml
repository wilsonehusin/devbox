package:
  name: jj
  version: "0.41.0"
  epoch: 0
  description: "A Git-compatible VCS that is both simple and powerful."
  copyright:
    - license: Apache-2.0

environment:
  contents:
    packages:
      - build-base
      - busybox
      - ca-certificates-bundle
      - rust
      - wolfi-base

pipeline:
  - uses: git-checkout
    with:
      repository: https://github.com/jj-vcs/jj
      expected-commit: 413f539283e5a87f0a2c64dec54a5258a1bee78f
      tag: v${{package.version}}

  - name: Configure and build
    runs: |
      cargo build --release
      mkdir -p ${{targets.destdir}}/usr/bin/
      mv target/release/jj ${{targets.destdir}}/usr/bin/jj

  - uses: strip

update:
  enabled: true
  github:
    identifier: jj-vcs/jj
    strip-prefix: v

test:
  pipeline:
    - runs: |
        jj --version
